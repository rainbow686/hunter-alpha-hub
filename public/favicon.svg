<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1a1a2e"/>
  <!-- Magnifying glass (search/investigation symbol) -->
  <circle cx="12" cy="12" r="7" fill="none" stroke="url(#gradient)" stroke-width="2.5"/>
  <line x1="17" y1="17" x2="26" y2="26" stroke="url(#gradient)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- AI spark inside magnifying glass -->
  <circle cx="12" cy="12" r="2" fill="url(#gradient)"/>
</svg>
