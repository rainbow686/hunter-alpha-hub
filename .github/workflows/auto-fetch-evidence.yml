name: Auto Import Evidence

on:
  workflow_dispatch: # 手动触发
    inputs:
      research_file:
        description: '检索文件名（如：hunter-alpha-research-2026-03-17.md）'
        required: false
        default: ''

jobs:
  import-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run import evidence script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx ts-node scripts/fetch-evidence.ts
